name: Vulnerability Check

on:
  schedule:
    - cron: "0 0 * * *" # 毎朝9:00 JST (= 0:00 UTC)
  workflow_dispatch:

jobs:
  vulnix:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://hyprland.cachix.org https://devenv.cachix.org
            extra-trusted-public-keys = hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc= devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=

      - name: Check material
        run: |
          if path=$(nix build --print-out-paths --no-link .#homeConfigurations.material.activationPackage); then
            nix run nixpkgs#vulnix -- "$path" 2>&1 | tee /tmp/vulnix-material.txt
            echo ${PIPESTATUS[0]} > /tmp/vulnix-material.exit
          else
            echo "Build failed" | tee /tmp/vulnix-material.txt
            echo 1 > /tmp/vulnix-material.exit
          fi

      - name: Check pastel
        run: |
          if path=$(nix build --print-out-paths --no-link .#homeConfigurations.pastel.activationPackage); then
            nix run nixpkgs#vulnix -- "$path" 2>&1 | tee /tmp/vulnix-pastel.txt
            echo ${PIPESTATUS[0]} > /tmp/vulnix-pastel.exit
          else
            echo "Build failed" | tee /tmp/vulnix-pastel.txt
            echo 1 > /tmp/vulnix-pastel.exit
          fi

      - name: Check wsl
        run: |
          if path=$(nix build --print-out-paths --no-link .#homeConfigurations.wsl.activationPackage); then
            nix run nixpkgs#vulnix -- "$path" 2>&1 | tee /tmp/vulnix-wsl.txt
            echo ${PIPESTATUS[0]} > /tmp/vulnix-wsl.exit
          else
            echo "Build failed" | tee /tmp/vulnix-wsl.txt
            echo 1 > /tmp/vulnix-wsl.exit
          fi

      - name: Create issue if vulnerabilities found
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          FOUND=false
          # GitHub issue body limit is 65536 chars; reserve space for header/footer
          MAX_BODY=60000
          BODY="## Vulnix 脆弱性レポート\n\n**検出日時**: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')\n**詳細ログ**: ${RUN_URL}\n\n"

          for PROFILE in material pastel wsl; do
            EXIT=$(cat /tmp/vulnix-${PROFILE}.exit 2>/dev/null || echo 1)
            OUTPUT=$(cat /tmp/vulnix-${PROFILE}.txt 2>/dev/null)
            if [ "$EXIT" != "0" ]; then
              FOUND=true
              SECTION="### ${PROFILE}\n\`\`\`\n${OUTPUT}\n\`\`\`\n\n"
              # Truncate if adding this section would exceed the limit
              CURRENT_LEN=${#BODY}
              SECTION_LEN=${#SECTION}
              if [ $((CURRENT_LEN + SECTION_LEN)) -gt $MAX_BODY ]; then
                TRUNCATED=$(echo "$OUTPUT" | head -c $((MAX_BODY - CURRENT_LEN - 60)))
                SECTION="### ${PROFILE}\n\`\`\`\n${TRUNCATED}\n...(truncated, see logs)\n\`\`\`\n\n"
              fi
              BODY+="$SECTION"
            fi
          done

          if [ "$FOUND" = "true" ]; then
            EXISTING=$(gh issue list --repo "$REPO" --label vulnerability --state open --json number --jq length)
            if [ "$EXISTING" = "0" ]; then
              printf "$BODY" | gh issue create \
                --repo "$REPO" \
                --title "🔒 Vulnerabilities detected ($(TZ=Asia/Tokyo date '+%Y-%m-%d'))" \
                --label vulnerability \
                --body-file -
            else
              echo "既存のissueが存在するためスキップ"
            fi
          fi
