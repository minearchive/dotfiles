bind = SUPER, T, exec, kitty --session ~/.bashrc
bind = SUPER, F, exec, firefox
bind = SUPER, Q, killactive
bind = SUPER, M, exec, hyprctl dispatch exit

bind = SUPER, R, exec, rofi -show run

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER+ALT, 1, ../script/move_window_to_ws.sh 1 0
bind = SUPER+ALT, 2, ../script/move_window_to_ws.sh 2 0
bind = SUPER+ALT, 3, ../script/move_window_to_ws.sh 3 0
bind = SUPER+ALT, 4, ../script/move_window_to_ws.sh 4 0
bind = SUPER+ALT, 5, ../script/move_window_to_ws.sh 5 0
bind = SUPER+ALT, 6, ../script/move_window_to_ws.sh 6 0
bind = SUPER+ALT, 7, ../script/move_window_to_ws.sh 7 0
bind = SUPER+ALT, 8, ../script/move_window_to_ws.sh 8 0
bind = SUPER+ALT, 9, ../script/move_window_to_ws.sh 9 0

bind = CTR+SUPER, Right, workspace, +1
bind = CTR+SUPER, Left, workspace, -1
bind = CTRL+SUPER, Down, exec, sh ../script/workspace_jump.sh 1
bind = CTRL+SUPER, Up, exec, sh ../script.workspace_jump.sh 0

bind = Super+Shift, S, exec, sh -c 'REGION=$(slurp) || exit; grim -g "$REGION" - | wl-copy &&  wl-paste > ~/Pictures/screenshots/Screenshot-$(date +%F_%T).png && dunstify "Screenshot of the region taken" -t 1000'
bind = SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/screenshots/Screenshot-$(date +%F_%T).png && dunstify "Screenshot of the whole screen taken" -t 1000
